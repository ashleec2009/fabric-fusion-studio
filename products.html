<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Product Library - Fabric Fusion Studio</title>

<style>

body {
background:#000;
color:white;
font-family:Arial,sans-serif;
text-align:center;
padding:20px;
}

h1 {
color:hotpink;
}

.card {
background:#222;
padding:20px;
border-radius:20px;
margin-bottom:20px;
}

input, select, textarea {
width:90%;
padding:12px;
margin:8px;
border-radius:10px;
border:none;
font-size:16px;
}

button {
width:90%;
padding:15px;
margin:8px;
border-radius:15px;
border:none;
background:hotpink;
font-weight:bold;
font-size:16px;
}

.product {
background:#111;
padding:15px;
border-radius:15px;
margin-top:15px;
}

</style>

</head>

<body>

<h1>🩷 Product Library</h1>

<div class="card">

<input id="name" placeholder="Product Name">

<select id="category">
<option>🗝️ Keychains</option>
<option>🏠 Home Decor</option>
<option>🎁 Gifts</option>
<option>🐉 Toys & Figures</option>
<option>💼 Business Items</option>
<option>✨ Custom Orders</option>
</select>

<input id="hours" placeholder="Print Hours">

<input id="grams" placeholder="Filament Grams">

<input id="price" placeholder="Selling Price">

<input id="photo" type="file" accept="image/*">

<textarea id="notes" placeholder="Notes"></textarea>

<button onclick="saveProduct()">
➕ Save Product
</button>

</div>


<div id="products"></div>


<script>

function getProducts(){

return JSON.parse(
localStorage.getItem("products")
) || [];

}



function saveProduct(){

let file =
document.getElementById("photo").files[0];


if(file){

let reader = new FileReader();

reader.onload = function(event){

saveProductData(event.target.result);

};

reader.readAsDataURL(file);


} else {

saveProductData("");

}

}



function saveProductData(photo){

let product = {

id: Date.now(),

name:
document.getElementById("name").value,

category:
document.getElementById("category").value,

hours:
Number(document.getElementById("hours").value) || 0,

grams:
Number(document.getElementById("grams").value) || 0,

price:
Number(document.getElementById("price").value) || 0,

photo: photo,

notes:
document.getElementById("notes").value

};


let products = getProducts();

products.push(product);


localStorage.setItem(
"products",
JSON.stringify(products)
);


clearForm();

showProducts();

}

document.getElementById("name").value="";
document.getElementById("hours").value="";
document.getElementById("grams").value="";
document.getElementById("price").value="";
document.getElementById("notes").value="";

}



function duplicateProduct(id){

let products=getProducts();

let original =
products.find(p=>p.id===id);


let copy={
...original,
id:Date.now(),
name:original.name+" Copy"
};


products.push(copy);


localStorage.setItem(
"products",
JSON.stringify(products)
);


showProducts();

}

function editProduct(id){

let products = getProducts();

let product = products.find(function(p){
return p.id === id;
});


let newName = prompt(
"Product Name:",
product.name
);

let newHours = prompt(
"Print Hours:",
product.hours
);

let newGrams = prompt(
"Filament Grams:",
product.grams
);

let newPrice = prompt(
"Selling Price:",
product.price
);

let newNotes = prompt(
"Notes:",
product.notes
);


product.name = newName;
product.hours = Number(newHours);
product.grams = Number(newGrams);
product.price = Number(newPrice);
product.notes = newNotes;


localStorage.setItem(
"products",
JSON.stringify(products)
);


showProducts();

}

function deleteProduct(id){

let answer = confirm(
"Are you sure you want to delete this product?"
);


if(!answer){
return;
}


let products=getProducts();


products = products.filter(function(product){

return product.id !== id;

});


localStorage.setItem(
"products",
JSON.stringify(products)
);


showProducts();

}



function showProducts(){

let products=getProducts();

let html="";


products.forEach(function(p){


let material =
p.grams * 0.026;


let machine =
p.hours * 2;


let cost =
material + machine;


let profit =
p.price - cost;


html += `

html += `
<div class="product">

${p.photo ? `<img src="${p.photo}" width="200">` : ""}

<h3>${p.name}</h3>

${p.category}<br><br>

🧵 ${p.grams}g filament<br>

⏱ ${p.hours} hours<br>

💲 Sell: $${p.price}<br>

📦 Cost: $${cost.toFixed(2)}<br>

🩷 Profit: $${profit.toFixed(2)}

<br><br>

${p.notes}

<br><br>

<button onclick="duplicateProduct(${p.id})">
📋 Duplicate Product
</button>

<button onclick="editProduct(${p.id})">
✏️ Edit Product
</button>

<button onclick="deleteProduct(${p.id})">
🗑️ Delete Product
</button>

</div>

`;

});


document.getElementById("products").innerHTML = html;

}


showProducts();


</script>


</body>
</html>
