<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fabric Fusion Studio - Product Vault</title>

<style>

body {
background:#000;
color:white;
font-family:Arial, sans-serif;
text-align:center;
padding:20px;
}

h1 {
color:hotpink;
}

.card {
background:#222;
padding:20px;
border-radius:20px;
margin-bottom:20px;
}

input, select, textarea {
width:90%;
padding:12px;
margin:8px;
border-radius:10px;
border:none;
font-size:16px;
}

button {
width:90%;
padding:15px;
margin:8px;
border-radius:15px;
border:none;
background:hotpink;
font-weight:bold;
font-size:16px;
}

.product {
background:#111;
padding:15px;
border-radius:15px;
margin-top:15px;
}

</style>

</head>

<body>

<h1>🩷 Product Vault</h1>


<div class="card">

<input id="name" placeholder="Product Name">


<select id="category">

<option>🗝️ Keychains</option>
<option>🏠 Home Decor</option>
<option>🎁 Gifts</option>
<option>🐉 Toys & Figures</option>
<option>💼 Business Items</option>
<option>✨ Custom Orders</option>

</select>


<input id="hours" placeholder="Print Hours">

<input id="grams" placeholder="Filament Grams">

<input id="price" placeholder="Selling Price">


<textarea id="notes" placeholder="Notes"></textarea>


<button onclick="saveProduct()">
➕ Save Product
</button>


</div>


<div id="products"></div>



<script>


function getProducts(){

return JSON.parse(
localStorage.getItem("products")
) || [];

}



function saveProduct(){


let product = {


id: Date.now(),


name:
document.getElementById("name").value,


category:
document.getElementById("category").value,


hours:
Number(document.getElementById("hours").value) || 0,


grams:
Number(document.getElementById("grams").value) || 0,


price:
Number(document.getElementById("price").value) || 0,


notes:
document.getElementById("notes").value


};



let products=getProducts();


products.push(product);



localStorage.setItem(
"products",
JSON.stringify(products)
);



clearForm();


showProducts();


}



function clearForm(){

document.getElementById("name").value="";

document.getElementById("hours").value="";

document.getElementById("grams").value="";

document.getElementById("price").value="";

document.getElementById("notes").value="";

}



function editProduct(id){


let products=getProducts();


let product =
products.find(p=>p.id===id);



product.name =
prompt("Product Name:", product.name);


product.hours =
Number(prompt("Print Hours:", product.hours));


product.grams =
Number(prompt("Filament Grams:", product.grams));


product.price =
Number(prompt("Selling Price:", product.price));


product.notes =
prompt("Notes:", product.notes);



localStorage.setItem(
"products",
JSON.stringify(products)
);



showProducts();


}



function duplicateProduct(id){


let products=getProducts();


let original =
products.find(p=>p.id===id);



let copy={

...original,

id:Date.now(),

name:original.name+" Copy"

};



products.push(copy);



localStorage.setItem(
"products",
JSON.stringify(products)
);



showProducts();


}



function deleteProduct(id){


if(!confirm(
"Are you sure you want to delete this product?"
)){

return;

}



let products=getProducts();



products =
products.filter(
p=>p.id!==id
);



localStorage.setItem(
"products",
JSON.stringify(products)
);



showProducts();


}




function showProducts(){


let products=getProducts();


let html="";



products.forEach(function(p){



let material =
p.grams * 0.026;



let machine =
p.hours * 2;



let cost =
material + machine;



let profit =
p.price - cost;



html += `


<div class="product">


<h3>${p.name}</h3>


${p.category}<br><br>


🧵 ${p.grams}g filament<br>

⏱ ${p.hours} hours<br><br>


💲 Sell: $${p.price.toFixed(2)}<br>

📦 Cost: $${cost.toFixed(2)}<br>

🩷 Profit: $${profit.toFixed(2)}



<br><br>


${p.notes}



<br><br>


<button onclick="editProduct(${p.id})">

✏️ Edit Product

</button>



<button onclick="duplicateProduct(${p.id})">

📋 Duplicate Product

</button>



<button onclick="deleteProduct(${p.id})">

🗑️ Delete Product

</button>


</div>


`;



});



document.getElementById("products").innerHTML=html;


}



showProducts();



</script>


</body>
</html>
