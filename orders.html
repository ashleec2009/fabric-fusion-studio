<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fabric Fusion Studio - Creation Tracker</title>


<style>

body {
background:#000;
color:white;
font-family:Arial, sans-serif;
padding:20px;
text-align:center;
}


h1 {
color:hotpink;
}


.card {

background:#1c1c1c;
border:1px solid #333;
border-radius:25px;
padding:25px;
margin:20px auto;
max-width:1000px;
box-shadow:0 10px 30px rgba(255,20,147,0.15);

}


input, select, textarea {

width:90%;
padding:12px;
margin:8px;
border-radius:10px;
border:none;
font-size:16px;

}


button {

width:90%;
padding:15px;
margin:8px;
border:none;
border-radius:20px;
background:linear-gradient(135deg,#ff1493,#ff69b4);
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:all .25s ease;
box-shadow:0 6px 15px rgba(255,20,147,.35);

}

button:hover{

transform:translateY(-2px);
box-shadow:0 10px 20px rgba(255,20,147,.45);

}


.order {

background:#111;
padding:15px;
border-radius:20px;
margin-top:15px;

}

.rush-order{
border-left:8px solid red;
box-shadow:0 6px 20px rgba(255,0,0,.35);
}

.priority-order{
border-left:8px solid gold;
box-shadow:0 6px 20px rgba(255,215,0,.25);
}

.standard-order{
border-left:8px solid hotpink;
}  

.status {

color:hotpink;
font-weight:bold;

}

#creationPanel {

position: fixed;
right: 0;
top: 0;
height: 100%;
width: 350px;
background:#1c1c1c;
padding:20px;
overflow:auto;
box-shadow:-5px 0 20px hotpink;

}  

</style>

</head>


<body>


<h1>
📋 Creation Tracker
</h1>


<p>
Where ideas become creations ✨
</p>

<button onclick="location.href='dashboard.html'">

🏠 Home

</button>
  
<button type="button" onclick="openCreationStudio()">

➕ New Creation

</button>
  
<div class="card" id="oldCreationForm" style="display:none;">


<h2>
➕ New Creation
</h2>


<select id="customer">

<option value="">
Choose Customer
</option>

</select>


<input id="product" placeholder="Product / Custom Idea">


<input id="quantity" placeholder="Quantity">


<input id="due" type="date">


<select id="newAssigned">

<option>
👩 Ashlee
</option>

<option>
👨 Garrett
</option>

<option>
👥 Fusion Fam
</option>

</select>


ç

<option>
👩 Ashlee
</option>

<option>
👨 Garrett
</option>

<option>
👥 Fusion Fam
</option>

</select>

<select id="newPriority">

<option value="🟢 Standard">
🟢 Standard
</option>

<option value="🟡 Priority">
🟡 Priority
</option>

<option value="🔴 Rush">
🔴 Rush
</option>

<textarea id="newNotes" placeholder="Creation Notes"></textarea>


<button type="button" onclick="saveNewCreation()">

💾 Save Creation

</button>


<button onclick="closeCreationStudio()">

❌ Cancel

</button>


</div>

<div id="orders"></div>




<script>


function getOrders(){

return JSON.parse(

localStorage.getItem("orders")

) || [];

}

function loadCustomers(){


let customers = JSON.parse(

localStorage.getItem("customers")

) || [];


let dropdown = document.getElementById(

"customer"

);



customers.forEach(function(c){


let option = document.createElement(

"option"

);


option.value = c.name;


option.textContent = c.name;


dropdown.appendChild(option);


});


}


function saveOrder(){


let order = {


id:Date.now(),


customer:

document.getElementById("customer").value,


product:

document.getElementById("product").value,


quantity:

document.getElementById("quantity").value,


due:

document.getElementById("due").value,


assigned:

document.getElementById("assigned").value,


status:

document.getElementById("status").value,


notes:

document.getElementById("notes").value


};



let orders=getOrders();


orders.push(order);



localStorage.setItem(

"orders",

JSON.stringify(orders)

);



clearForm();

showOrders();


}



function clearForm(){

document.getElementById("customer").value="";

document.getElementById("product").value="";

document.getElementById("quantity").value="";

document.getElementById("due").value="";

document.getElementById("notes").value="";

}


function updateStatus(id, newStatus){


let orders = getOrders();


let order = orders.find(

o => o.id === id

);


order.status = newStatus;


localStorage.setItem(

"orders",

JSON.stringify(orders)

);


showOrders();


}

function showOrders(){


let orders=getOrders();


orders.sort(function(a, b){

if(!a.due && !b.due){
return 0;
}

if(!a.due){
return 1;
}

if(!b.due){
return -1;
}

return new Date(a.due + "T00:00:00")
-
new Date(b.due + "T00:00:00");

});


let html="";


orders.forEach(function(o){


html += `

<div class="order ${o.priority === "🔴 Rush" ? "rush-order" : o.priority === "🟡 Priority" ? "priority-order" : "standard-order"}">

<h3>
${o.product}
</h3>


👤 ${o.customer}

<br>

📦 Quantity: ${o.quantity}

<br>

📅 Due: ${o.due}


<br>

👥 ${o.assigned}

<br>

🚦 ${o.priority || "🟢 Standard"}


<br><br>


<span class="status">

${o.status}

</span>


<br><br>


<button onclick="updateStatus(${o.id}, '🎨 Preparing')">

🎨 Preparing

</button>


<button onclick="updateStatus(${o.id}, '🖨️ Making Magic')">

🖨️ Making Magic

</button>


<button onclick="updateStatus(${o.id}, '📦 Ready')">

📦 Ready

</button>


<button onclick="confirmDelivery(${o.id})">

🎉 Delivered

</button>

<button onclick="editOrder(${o.id})">

✏️ Edit Order

</button>

<button onclick="confirmDeleteOrder(${o.id})">

🗑️ Delete Order

</button>
<br><br>


📝 ${o.notes}


</div>

`;


});


document.getElementById("orders").innerHTML=html;


}

function editOrder(id){

let orders = JSON.parse(
localStorage.getItem("orders")
) || [];


let order = orders.find(
o => o.id === id
);


let newProduct = prompt(
"Edit Product:",
order.product
);


if(newProduct !== null){

order.product = newProduct;


localStorage.setItem(
"orders",
JSON.stringify(orders)
);


showOrders();

}

}

loadCustomers();

showOrders();

function completeOrder(id){

let orders = JSON.parse(
localStorage.getItem("orders")
) || [];


let order = orders.find(
o => o.id === id
);


let history = JSON.parse(
localStorage.getItem("orderHistory")
) || [];


order.status = "🎉 Delivered";


history.push(order);


localStorage.setItem(
"orderHistory",
JSON.stringify(history)
);


orders = orders.filter(
o => o.id !== id
);


localStorage.setItem(
"orders",
JSON.stringify(orders)
);


showOrders();


}

function confirmDelivery(id){

let answer = confirm(
"Are you sure you want to mark this order as delivered?"
);


if(answer){

completeOrder(id);

}

}

function confirmDeleteOrder(id){

let answer = confirm(
"Are you sure you want to delete this order?"
);


if(answer){

deleteOrder(id);

}

}

function deleteOrder(id){

let orders = JSON.parse(

localStorage.getItem("orders")

) || [];


orders = orders.filter(

o => o.id !== id

);


localStorage.setItem(

"orders",

JSON.stringify(orders)

);


showOrders();

}  

function openCreationStudio(){

document.getElementById(
"creationPanel"
).style.display="block";

}


function closeCreationStudio(){

document.getElementById(
"creationPanel"
).style.display="none";


document.getElementById("newProduct").value="";
document.getElementById("newQuantity").value="";
document.getElementById("newDue").value="";
document.getElementById("newNotes").value="";

}



function saveNewCreation(){

let orders = JSON.parse(
localStorage.getItem("orders")
) || [];


let newOrder = {

id: Date.now(),

customer: document.getElementById(
"newCustomer"
).value,


product: document.getElementById(
"newProduct"
).value,


quantity: document.getElementById(
"newQuantity"
).value,


due: document.getElementById(
"newDue"
).value,


assigned: document.getElementById(
"newAssigned"
).value,


priority: document.getElementById(
"creationPriority"
).value,


status: "✨ New Creation",


notes: document.getElementById(
"newNotes"
).value

};


orders.push(newOrder);


localStorage.setItem(

"orders",

JSON.stringify(orders)

);


closeCreationStudio();


showOrders();

}
  
</script>


</body>

</html>
