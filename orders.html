<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fabric Fusion Studio - Creation Tracker</title>


<style>

body {
background:#000;
color:white;
font-family:Arial, sans-serif;
padding:20px;
text-align:center;
}


h1 {
color:hotpink;
}


.card {

background:#1c1c1c;
border-radius:25px;
padding:20px;
margin:15px 0;

}


input, select, textarea {

width:90%;
padding:12px;
margin:8px;
border-radius:10px;
border:none;
font-size:16px;

}


button {

width:90%;
padding:15px;
margin:8px;
border:none;
border-radius:20px;
background:hotpink;
font-size:16px;
font-weight:bold;

}


.order {

background:#111;
padding:15px;
border-radius:20px;
margin-top:15px;

}


.status {

color:hotpink;
font-weight:bold;

}

#creationPanel {

position: fixed;
right: 0;
top: 0;
height: 100%;
width: 350px;
background:#1c1c1c;
padding:20px;
overflow:auto;
box-shadow:-5px 0 20px hotpink;

}  

</style>

</head>


<body>


<h1>
📋 Creation Tracker
</h1>


<p>
Where ideas become creations ✨
</p>

<button onclick="location.href='index.html'">

🏠 Home

</button>
  
<button type="button" onclick="openCreationStudio()">

➕ New Creation

</button>
  
<div class="card" id="oldCreationForm" style="display:none;">


<h2>
➕ New Creation
</h2>


<select id="customer">

<option value="">
Choose Customer
</option>

</select>


<input id="product" placeholder="Product / Custom Idea">


<input id="quantity" placeholder="Quantity">


<input id="due" type="date">


<select id="assigned">

<option>
👩 Ashlee
</option>

<option>
👨 Fusion Fam Production
</option>

</select>



<select id="status">


<option>
✨ New Creation
</option>


<option>
🎨 Preparing
</option>


<option>
🖨️ Making Magic
</option>


<option>
📦 Ready
</option>


<option>
🎉 Delivered
</option>


</select>



<textarea id="notes" placeholder="Creation Notes"></textarea>



<button onclick="saveOrder()">

➕ Save Creation

</button>


</div>


<div id="creationPanel" class="card" style="display:none;">

<h2>
✨ Creation Studio
</h2>


<select id="newCustomer">

<option value="">
Choose Customer
</option>

</select>


<input id="newProduct" placeholder="Product / Custom Idea">


<input id="newQuantity" placeholder="Quantity">


<input id="newDue" type="date">


<select id="newAssigned">

<option>
👩 Ashlee
</option>

<option>
👨 Garrett
</option>

<option>
👥 Fusion Fam
</option>

</select>


<textarea id="newNotes" placeholder="Creation Notes"></textarea>


<button onclick="saveNewCreation()">

💾 Save Creation

</button>


<button onclick="closeCreationStudio()">

❌ Cancel

</button>


</div>

<div id="orders"></div>




<script>


function getOrders(){

return JSON.parse(

localStorage.getItem("orders")

) || [];

}

function loadCustomers(){


let customers = JSON.parse(

localStorage.getItem("customers")

) || [];


let dropdown = document.getElementById(

"customer"

);



customers.forEach(function(c){


let option = document.createElement(

"option"

);


option.value = c.name;


option.textContent = c.name;


dropdown.appendChild(option);


});


}


function saveOrder(){


let order = {


id:Date.now(),


customer:

document.getElementById("customer").value,


product:

document.getElementById("product").value,


quantity:

document.getElementById("quantity").value,


due:

document.getElementById("due").value,


assigned:

document.getElementById("assigned").value,


status:

document.getElementById("status").value,


notes:

document.getElementById("notes").value


};



let orders=getOrders();


orders.push(order);



localStorage.setItem(

"orders",

JSON.stringify(orders)

);



clearForm();

showOrders();


}



function clearForm(){

document.getElementById("customer").value="";

document.getElementById("product").value="";

document.getElementById("quantity").value="";

document.getElementById("due").value="";

document.getElementById("notes").value="";

}


function updateStatus(id, newStatus){


let orders = getOrders();


let order = orders.find(

o => o.id === id

);


order.status = newStatus;


localStorage.setItem(

"orders",

JSON.stringify(orders)

);


showOrders();


}

function showOrders(){


let orders=getOrders();


let html="";


orders.forEach(function(o){


html += `


<div class="order">


<h3>
${o.product}
</h3>


👤 ${o.customer}

<br>

📦 Quantity: ${o.quantity}

<br>

📅 Due: ${o.due}


<br>

👥 ${o.assigned}


<br><br>


<span class="status">

${o.status}

</span>


<br><br>


<button onclick="updateStatus(${o.id}, '🎨 Preparing')">

🎨 Preparing

</button>


<button onclick="updateStatus(${o.id}, '🖨️ Making Magic')">

🖨️ Making Magic

</button>


<button onclick="updateStatus(${o.id}, '📦 Ready')">

📦 Ready

</button>


<button onclick="confirmDelivery(${o.id})">

🎉 Delivered

</button>

<button onclick="editOrder(${o.id})">

✏️ Edit Order

</button>

<button onclick="confirmDeleteOrder(${o.id})">

🗑️ Delete Order

</button>
<br><br>


📝 ${o.notes}


</div>

`;


});


document.getElementById("orders").innerHTML=html;


}

function editOrder(id){

let orders = JSON.parse(
localStorage.getItem("orders")
) || [];


let order = orders.find(
o => o.id === id
);


let newProduct = prompt(
"Edit Product:",
order.product
);


if(newProduct !== null){

order.product = newProduct;


localStorage.setItem(
"orders",
JSON.stringify(orders)
);


showOrders();

}

}

loadCustomers();

showOrders();

function completeOrder(id){

let orders = JSON.parse(
localStorage.getItem("orders")
) || [];


let order = orders.find(
o => o.id === id
);


let history = JSON.parse(
localStorage.getItem("orderHistory")
) || [];


order.status = "🎉 Delivered";


history.push(order);


localStorage.setItem(
"orderHistory",
JSON.stringify(history)
);


orders = orders.filter(
o => o.id !== id
);


localStorage.setItem(
"orders",
JSON.stringify(orders)
);


showOrders();


}

function confirmDelivery(id){

let answer = confirm(
"Are you sure you want to mark this order as delivered?"
);


if(answer){

completeOrder(id);

}

}

function confirmDeleteOrder(id){

let answer = confirm(
"Are you sure you want to delete this order?"
);


if(answer){

deleteOrder(id);

}

}

function deleteOrder(id){

let orders = JSON.parse(

localStorage.getItem("orders")

) || [];


orders = orders.filter(

o => o.id !== id

);


localStorage.setItem(

"orders",

JSON.stringify(orders)

);


showOrders();

}  

function openCreationStudio(){

document.getElementById(
"creationPanel"
).style.display="block";

}


function closeCreationStudio(){

document.getElementById(
"creationPanel"
).style.display="none";

}
  
</script>


</body>

</html>
