<!DOCTYPE html>
<html>

<head>

<title>Order History</title>

</head>


<body>

<h1>
📚 Order History
</h1>


<div id="historyList">

</div>


<script>


let history = JSON.parse(

localStorage.getItem("orderHistory")

) || [];



let container = document.getElementById(

"historyList"

);



if(history.length === 0){

container.innerHTML =

"<p>No completed orders yet.</p>";

}



history.forEach(function(order){


container.innerHTML += `

<div>

<h2>
${order.customer}
</h2>

<p>
${order.product}
</p>

<p>
Status: 🎉 Delivered
</p>

<button onclick="restoreOrder(${order.id})">

↩️ Return to Active Orders

</button>

</div>

`;


});

function restoreOrder(id){

let history = JSON.parse(

localStorage.getItem("orderHistory")

) || [];


let orders = JSON.parse(

localStorage.getItem("orders")

) || [];


let order = history.find(

o => o.id === id

);


order.status = "📦 Ready";


orders.push(order);


history = history.filter(

o => o.id !== id

);


localStorage.setItem(

"orders",

JSON.stringify(orders)

);


localStorage.setItem(

"orderHistory",

JSON.stringify(history)

);


location.reload();

}
  
</script>


</body>

</html>
